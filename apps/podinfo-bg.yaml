apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo-bg
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mifisignal/gitops-demo
    targetRevision: HEAD
    path: apps/podinfo-bg/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo-bg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true